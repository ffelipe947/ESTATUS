<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estatus Propiedades · Osorno</title>
  <meta name="description" content="Propiedades seleccionadas en Osorno, Chile. Diseño. Ubicación. Estatus." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #8a7560;
      --gold-light: #b5a08a;
      --black: #0a0a0a;
      --black-soft: #111111;
      --black-mid: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --white: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 4rem;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      padding: 3rem 2rem 2rem;
      text-align: center;
      animation: fadeDown 0.8s ease both;
    }

    .logo-mark {
      display: inline-block;
      width: 56px;
      height: 56px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.4rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo-mark span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .header-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: var(--white);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.05rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.4;
      margin: 1.2rem auto;
    }

    /* ── HERO IMAGE ── */
    .hero {
      width: 100%;
      height: 240px;
      position: relative;
      overflow: hidden;
      animation: fadeIn 1s ease 0.3s both;
    }

    .hero-bg {
      width: 100%;
      height: 100%;
      background:
        linear-gradient(180deg, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0) 40%, rgba(10,10,10,0) 60%, rgba(10,10,10,0.8) 100%),
        linear-gradient(135deg, #1a1a18 0%, #2c2a26 30%, #4a4438 55%, #3d3830 75%, #1e1c18 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-inner {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      color: rgba(138,117,96,0.8);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.8rem;
    }

    .hero-quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .hero-quote em {
      color: var(--gold-light);
      font-style: normal;
    }

    /* ── LINKS SECTION ── */
    .links {
      width: 100%;
      padding: 2.2rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .link-label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: rgba(138,117,96,0.6);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.2rem;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: var(--black-soft);
      border: 0.5px solid var(--border);
      border-radius: 60px;
      padding: 1.1rem 2rem;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.15s;
      animation: fadeUp 0.7s ease both;
    }

    .social-btn:nth-child(2) { animation-delay: 0.15s; }
    .social-btn:nth-child(3) { animation-delay: 0.25s; }
    .social-btn:nth-child(4) { animation-delay: 0.35s; }

    .social-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(138,117,96,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .social-btn:hover {
      border-color: rgba(138,117,96,0.5);
      transform: translateY(-2px);
    }

    .social-btn:hover::after { opacity: 1; }
    .social-btn:active { transform: scale(0.98) translateY(0); }

    .social-btn svg {
      width: 26px;
      height: 26px;
      fill: var(--white);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .btn-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-left: 1rem;
      position: relative;
      z-index: 1;
    }

    /* ── TAGLINE STRIP ── */
    .tagline-strip {
      margin-top: 2.8rem;
      width: 100%;
      padding: 1.2rem 2rem;
      border-top: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 2rem;
      animation: fadeIn 1s ease 0.6s both;
    }

    .tag-item {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(138,117,96,0.7);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .tag-dot {
      color: rgba(138,117,96,0.3);
      font-size: 0.5rem;
      vertical-align: middle;
    }

    /* ── FOOTER BRAND ── */
    .footer-brand {
      margin-top: 2.5rem;
      text-align: center;
      animation: fadeIn 1s ease 0.7s both;
    }

    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .footer-city {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 300;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 400px) {
      .tagline-strip { gap: 1rem; }
      .tag-item { font-size: 0.72rem; }
    }
  </style>
</head>
<body>
